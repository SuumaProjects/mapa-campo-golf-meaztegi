<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Mapa del campo</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIINfQuxySiC02L4zgSjjA8f8g4D/0zHAxw=" crossorigin="" />
  <style>
    :root {
      --green:#20b26b;
      --yellow:#f3c623;
      --blue:#2d9cdb;
      --purple:#7b61ff;
      --orange:#ff9f1c;
      --dark:#101820;
      --white:#fff;
      --muted:#65707a;
      --panel:rgba(255,255,255,.94);
    }
    html, body, #map { height:100%; width:100%; margin:0; padding:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif; background:#dfe6e9; }
    .leaflet-control-attribution { display:none; }
    .top-card {
      position:absolute; z-index:1000; top:12px; left:12px; right:12px;
      background:var(--panel); border-radius:18px; padding:12px 14px;
      box-shadow:0 8px 24px rgba(0,0,0,.18); backdrop-filter:blur(6px);
    }
    .top-card h1 { margin:0; font-size:18px; line-height:1.15; color:var(--dark); }
    .top-card p { margin:4px 0 0; font-size:13px; color:var(--muted); }
    .legend { display:flex; gap:8px; flex-wrap:wrap; margin-top:9px; font-size:12px; color:#2b333b; }
    .legend span { display:inline-flex; align-items:center; gap:5px; background:#f5f7f8; padding:5px 7px; border-radius:999px; }
    .dot { width:10px; height:10px; border-radius:50%; display:inline-block; border:1px solid rgba(0,0,0,.25); }
    .bottom-card {
      position:absolute; z-index:1000; left:12px; right:12px; bottom:calc(12px + env(safe-area-inset-bottom));
      background:var(--panel); border-radius:20px; padding:13px 14px;
      box-shadow:0 -8px 28px rgba(0,0,0,.22); backdrop-filter:blur(6px);
    }
    .selected-title { font-weight:750; font-size:17px; color:var(--dark); margin-bottom:3px; }
    .selected-subtitle { font-size:13px; color:var(--muted); margin-bottom:10px; }
    .actions { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
    button {
      border:0; border-radius:14px; padding:11px 8px; font-weight:700; font-size:13px;
      background:#111827; color:#fff; cursor:pointer;
    }
    button.secondary { background:#eef2f4; color:#111827; }
    .pin {
      width:34px; height:34px; border-radius:50% 50% 50% 4px; transform:rotate(-45deg);
      display:flex; align-items:center; justify-content:center;
      border:2px solid rgba(255,255,255,.95); box-shadow:0 4px 12px rgba(0,0,0,.35);
    }
    .pin span { transform:rotate(45deg); font-weight:800; font-size:11px; color:white; letter-spacing:-.2px; }
    .pin.hole { background:var(--green); }
    .pin.start { background:var(--yellow); }
    .pin.start span { color:#111827; }
    .pin.wc { background:var(--blue); }
    .pin.clubhouse { background:var(--purple); }
    .pin.practice { background:var(--orange); }
    .user-dot {
      width:20px; height:20px; background:#1677ff; border:3px solid white; border-radius:50%;
      box-shadow:0 0 0 8px rgba(22,119,255,.18), 0 4px 12px rgba(0,0,0,.35);
    }
    @media (max-width: 380px) {
      .actions { grid-template-columns:1fr; }
      .top-card h1 { font-size:16px; }
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div class="top-card">
    <h1 id="title">Mapa del campo</h1>
    <p id="intro">Toca un punto del campo para ver la referencia y abrir navegación.</p>
    <div class="legend">
      <span><i class="dot" style="background:var(--green)"></i><b id="legHoles">Hoyos</b></span>
      <span><i class="dot" style="background:var(--yellow)"></i><b id="legStart">Inicio vuelta</b></span>
      <span><i class="dot" style="background:var(--blue)"></i><b id="legServices">Servicios</b></span>
      <span><i class="dot" style="background:var(--purple)"></i><b id="legClub">Casa Club</b></span>
      <span><i class="dot" style="background:#1677ff"></i><b id="legYou">Tú</b></span>
    </div>
  </div>

  <div class="bottom-card">
    <div class="selected-title" id="selectedTitle">Referencia del campo</div>
    <div class="selected-subtitle" id="selectedSubtitle">Selecciona un punto o centra el mapa completo.</div>
    <div class="actions">
      <button id="navBtn">Abrir navegación</button>
      <button class="secondary" id="locBtn">Centrarme</button>
      <button class="secondary" id="fieldBtn">Ver campo</button>
    </div>
  </div>

    const params = new URLSearchParams(window.location.search);
    const rawLang = (params.get('lang') || 'es').toLowerCase();
    const lang = rawLang.startsWith('en') ? 'en' : rawLang.startsWith('fr') ? 'fr' : rawLang.startsWith('de') ? 'de' : rawLang.startsWith('eu') ? 'eu' : 'es';

    const t = {
      es: {
        title:'Mapa del campo',
        intro:'Toca un punto del campo para ver la referencia y abrir navegación.',
        ref:'Referencia del campo',
        refSub:'Selecciona un punto o centra el mapa completo.',
        holes:'Hoyos', start:'Inicio vuelta', services:'Servicios', club:'Casa Club', you:'Tú',
        nav:'Abrir navegación', center:'Centrarme', field:'Ver campo',
        selected:'Punto seleccionado', noGeo:'No se ha podido obtener tu ubicación.', outside:'Tu posición está fuera del entorno del campo.'
      },
      en: {
        title:'Course map',
        intro:'Tap a course point to view the reference and open navigation.',
        ref:'Course reference',
        refSub:'Select a point or center the full course map.',
        holes:'Holes', start:'Round start', services:'Services', club:'Clubhouse', you:'You',
        nav:'Open navigation', center:'Center me', field:'View course',
        selected:'Selected point', noGeo:'Unable to get your location.', outside:'Your position is outside the course area.'
      },
      fr: { title:'Plan du parcours', intro:'Touchez un point du parcours pour voir la référence et ouvrir la navigation.', ref:'Référence du parcours', refSub:'Sélectionnez un point ou centrez tout le parcours.', holes:'Trous', start:'Départ du parcours', services:'Services', club:'Club-house', you:'Vous', nav:'Ouvrir navigation', center:'Me centrer', field:'Voir parcours', selected:'Point sélectionné', noGeo:'Impossible d’obtenir votre position.', outside:'Votre position est en dehors du parcours.' },
      de: { title:'Platzkarte', intro:'Tippen Sie auf einen Punkt, um die Referenz zu sehen und die Navigation zu öffnen.', ref:'Platzreferenz', refSub:'Wählen Sie einen Punkt oder zentrieren Sie den gesamten Platz.', holes:'Löcher', start:'Rundenstart', services:'Services', club:'Clubhaus', you:'Sie', nav:'Navigation öffnen', center:'Zentrieren', field:'Platz anzeigen', selected:'Ausgewählter Punkt', noGeo:'Standort konnte nicht ermittelt werden.', outside:'Ihre Position liegt außerhalb des Platzbereichs.' },
      eu: { title:'Zelaiaren mapa', intro:'Sakatu zelaiaren puntu bat erreferentzia ikusteko eta nabigazioa irekitzeko.', ref:'Zelaiaren erreferentzia', refSub:'Hautatu puntu bat edo zentratu mapa osoa.', holes:'Zuloak', start:'Itzuli hasiera', services:'Zerbitzuak', club:'Klub etxea', you:'Zu', nav:'Ireki nabigazioa', center:'Zentratu', field:'Ikusi zelaia', selected:'Hautatutako puntua', noGeo:'Ezin izan da zure kokapena lortu.', outside:'Zure kokapena zelaiaren eremutik kanpo dago.' }
    }[lang];

    document.documentElement.lang = lang;
    title.textContent = t.title; intro.textContent = t.intro;
    legHoles.textContent = t.holes; legStart.textContent = t.start; legServices.textContent = t.services; legClub.textContent = t.club; legYou.textContent = t.you;
    selectedTitle.textContent = t.ref; selectedSubtitle.textContent = t.refSub;
    navBtn.textContent = t.nav; locBtn.textContent = t.center; fieldBtn.textContent = t.field;

    const map = L.map('map', { zoomControl:false, maxZoom:20 });
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
      maxZoom:20
    }).addTo(map);

    const bounds = L.latLngBounds(POINTS.map(p => [p.lat, p.lng]));
    map.fitBounds(bounds.pad(0.22));

    let selected = POINTS.find(p => p.id === 'H1') || POINTS[0];
    let userMarker = null;

    function typeClass(p) {
      if (p.start) return 'start';
      return p.type;
    }

    function iconFor(p) {
      return L.divIcon({
        className:'',
        html:`<div class="pin ${typeClass(p)}"><span>${p.name}</span></div>`,
        iconSize:[34,34],
        iconAnchor:[17,34],
        popupAnchor:[0,-30]
      });
    }

    function selectPoint(p, pan=true) {
      selected = p;
      selectedTitle.textContent = p.title[lang] || p.title.es || p.name;
      selectedSubtitle.textContent = t.selected;
      if (pan) map.flyTo([p.lat, p.lng], Math.max(map.getZoom(), 18), { duration:.5 });
    }

    POINTS.forEach(p => {
      const marker = L.marker([p.lat, p.lng], { icon: iconFor(p) }).addTo(map);
      marker.on('click', () => selectPoint(p));
    });

    function openNavigation() {
      if (!selected) return;
      window.open(`https://waze.com/ul?ll=${selected.lat},${selected.lng}&navigate=yes`, '_blank');
    }

    function showUser(lat, lng) {
      if (userMarker) userMarker.setLatLng([lat, lng]);
      else {
        userMarker = L.marker([lat, lng], {
          icon: L.divIcon({ className:'', html:'<div class="user-dot"></div>', iconSize:[20,20], iconAnchor:[10,10] })
        }).addTo(map);
      }
      const userLatLng = L.latLng(lat, lng);
      const nearCourse = bounds.pad(0.9).contains(userLatLng);
      selectedTitle.textContent = t.you;
      selectedSubtitle.textContent = nearCourse ? `${lat.toFixed(6)}, ${lng.toFixed(6)}` : t.outside;
      map.flyTo([lat, lng], 18, { duration:.5 });
    }

    function centerMe() {
      const loc = params.get('loc');
      if (loc && loc.includes(',')) {
        const [lat, lng] = loc.split(',').map(Number);
        if (Number.isFinite(lat) && Number.isFinite(lng)) return showUser(lat, lng);
      }
      if (!navigator.geolocation) {
        selectedTitle.textContent = t.ref;
        selectedSubtitle.textContent = t.noGeo;
        return;
      }
      navigator.geolocation.getCurrentPosition(
        pos => showUser(pos.coords.latitude, pos.coords.longitude),
        () => { selectedTitle.textContent = t.ref; selectedSubtitle.textContent = t.noGeo; },
        { enableHighAccuracy:true, timeout:8000, maximumAge:30000 }
      );
    }

    navBtn.addEventListener('click', openNavigation);
    locBtn.addEventListener('click', centerMe);
    fieldBtn.addEventListener('click', () => map.fitBounds(bounds.pad(0.22)));

    // Permite demo con ubicación fija sin dependencia de Glide:
    // ?loc=43.288200,-3.063052&lang=es&v=demo1
    if (params.get('loc')) centerMe();
  </script>
